<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非心カイ二乗分布 PDF 可視化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        canvas { background-color: #ffffff; display: block; width: 100%; max-width: 700px; height: 400px; margin: 0 auto; border-radius: 8px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        input[type=range] { width: 100%; }
        .math { font-style: italic; font-family: serif; }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-4xl w-full bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">10章：非心カイ二乗分布の確率密度関数 (PDF)</h2>
        <p class="text-sm text-gray-600 mb-6 text-center">観測値 <span class="math">M<sub>2</sub></span> を固定し、非心パラメータ <span class="math">λ</span> を動かすことで、<br>分布の移動と累積確率（青い面積）の変化を確認できます。</p>

        <canvas id="canvas" width="700" height="400"></canvas>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-6">
            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h3 class="font-semibold text-gray-700 border-b pb-2">パラメータ設定</h3>

                <div class="flex items-center justify-between">
                    <label class="w-24 text-sm font-medium">自由度 (df):</label>
                    <input type="range" id="dfRange" min="1" max="50" value="7" class="flex-1 mx-4">
                    <span id="dfVal" class="w-12 text-right font-mono">7</span>
                </div>

                <div class="flex items-center justify-between">
                    <label class="w-24 text-sm font-medium text-blue-600">観測値 (M<sub>2</sub>):</label>
                    <input type="range" id="M2Range" min="0" max="60" step="0.1" value="15.0" class="flex-1 mx-4">
                    <span id="M2Val" class="w-12 text-right font-mono text-blue-600">15.0</span>
                </div>

                <div class="flex items-center justify-between">
                    <label class="w-24 text-sm font-medium">学習者数 (I):</label>
                    <input type="range" id="IRange" min="10" max="1000" step="1" value="509" class="flex-1 mx-4">
                    <span id="IVal" class="w-12 text-right font-mono">509</span>
                </div>

                <div class="flex items-center justify-between pt-4 border-t border-gray-300">
                    <label class="w-24 text-sm font-bold text-red-600">非心度 (λ):</label>
                    <input type="range" id="lambdaRange" min="0" max="100" step="0.1" value="8.0" class="flex-1 mx-4 accent-red-500">
                    <span id="lambdaVal" class="w-12 text-right font-mono font-bold text-red-600">8.0</span>
                </div>
            </div>

            <div class="space-y-4 flex flex-col justify-between">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 flex-1">
                    <h3 class="font-semibold text-blue-800 border-b border-blue-200 pb-2 mb-2">RMSEA<sub>2</sub> と 90%信頼区間</h3>
                    <div id="results" class="text-sm space-y-1 text-gray-700">
                        <!-- 結果がここに挿入される -->
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h3 class="font-semibold text-gray-700 mb-2 text-sm">現在の λ を以下の値にセット:</h3>
                    <div class="flex space-x-2">
                        <button id="btnL" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-xs font-bold py-2 px-2 rounded shadow transition">下限 L<br>(CDF 0.95)</button>
                        <button id="btnEst" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold py-2 px-2 rounded shadow transition">点推定値<br>λ_est</button>
                        <button id="btnU" class="flex-1 bg-red-500 hover:bg-red-600 text-white text-xs font-bold py-2 px-2 rounded shadow transition">上限 U<br>(CDF 0.05)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const dfRange = document.getElementById('dfRange');
        const M2Range = document.getElementById('M2Range');
        const IRange = document.getElementById('IRange');
        const lambdaRange = document.getElementById('lambdaRange');

        const dfVal = document.getElementById('dfVal');
        const M2Val = document.getElementById('M2Val');
        const IVal = document.getElementById('IVal');
        const lambdaVal = document.getElementById('lambdaVal');
        const resultsBox = document.getElementById('results');

        // ガンマ関数の自然対数 (オーバーフロー対策)
        function lngamma(z) {
            const g = 7;
            const p = [0.99999999999980993, 676.5203681218851, -1259.1392167224028,
                       771.32342877765313, -176.61502916214059, 12.507343278686905,
                       -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
            if (z < 0.5) return Math.log(Math.PI) - Math.log(Math.sin(Math.PI * z)) - lngamma(1 - z);
            z -= 1;
            let x = p[0];
            for (let i = 1; i < g + 2; i++) x += p[i] / (z + i);
            let t = z + g + 0.5;
            return 0.5 * Math.log(2 * Math.PI) + (z + 0.5) * Math.log(t) - t + Math.log(x);
        }

        // 中心カイ二乗分布の PDF
        function chiSqPDF(x, df) {
            if (x <= 0) return 0;
            const k_half = df / 2;
            const ln_f = (k_half - 1) * Math.log(x) - x / 2 - k_half * Math.log(2) - lngamma(k_half);
            return Math.exp(ln_f);
        }

        // 非心カイ二乗分布の PDF
        function nonCentralChiSqPDF(x, df, lambda) {
            if (x <= 0) return 0;
            if (lambda === 0) return chiSqPDF(x, df);

            let sum = 0;
            const maxIter = 100;
            const halfLambda = lambda / 2;

            for (let j = 0; j < maxIter; j++) {
                const lnWeight = -halfLambda + j * Math.log(halfLambda) - lngamma(j + 1);
                const weight = Math.exp(lnWeight);
                if (weight < 1e-12 && j > halfLambda) break; // 無視できるほど小さければ打ち切り
                sum += weight * chiSqPDF(x, df + 2 * j);
            }
            return sum;
        }

        // 中心カイ二乗分布の CDF (級数展開)
        function lowIncompleteGamma(a, x) {
            if (x <= 0) return 0;
            let sum = 1 / a;
            let term = 1 / a;
            for (let i = 1; i < 100; i++) {
                term *= x / (a + i);
                sum += term;
                if (term < sum * 1e-10) break;
            }
            return Math.exp(-x + a * Math.log(x) - lngamma(a)) * sum;
        }

        function chiSqCDF(x, df) {
            if (x <= 0) return 0;
            return lowIncompleteGamma(df / 2, x / 2);
        }

        // 非心カイ二乗分布の CDF
        function nonCentralChiSqCDF(x, df, lambda) {
            if (x <= 0) return 0;
            if (lambda === 0) return chiSqCDF(x, df);

            let sum = 0;
            const maxIter = 100;
            const halfLambda = lambda / 2;
            for (let j = 0; j < maxIter; j++) {
                const lnWeight = -halfLambda + j * Math.log(halfLambda) - lngamma(j + 1);
                const weight = Math.exp(lnWeight);
                if (weight < 1e-12 && j > halfLambda) break;
                sum += weight * chiSqCDF(x, df + 2 * j);
            }
            return sum;
        }

        function findLambda(M2, df, target) {
            if (M2 <= 0) return 0;
            let p_zero = nonCentralChiSqCDF(M2, df, 0);
            if (p_zero < target) return 0;

            let low = 0;
            let high = 50;
            while (nonCentralChiSqCDF(M2, df, high) > target && high < 2000) high *= 2;

            for (let i = 0; i < 50; i++) {
                let mid = (low + high) / 2;
                let p = nonCentralChiSqCDF(M2, df, mid);
                if (p > target) low = mid;
                else high = mid;
            }
            return (low + high) / 2;
        }

        let L_global = 0;
        let U_global = 0;
        let est_global = 0;

        function updateAndDraw() {
            const df = parseFloat(dfRange.value);
            const M2 = parseFloat(M2Range.value);
            const I = parseFloat(IRange.value);

            // Lambdaスライダーの最大値をM2等に応じて動的に調整
            const dynamicMaxLambda = Math.max(100, Math.ceil(M2 * 2.5));
            if (parseFloat(lambdaRange.max) !== dynamicMaxLambda) {
                lambdaRange.max = dynamicMaxLambda;
            }

            const lambda = parseFloat(lambdaRange.value);

            dfVal.textContent = df;
            M2Val.textContent = M2.toFixed(1);
            IVal.textContent = I;
            lambdaVal.textContent = lambda.toFixed(1);

            // 推定値の計算
            est_global = Math.max(M2 - df, 0);
            L_global = findLambda(M2, df, 0.95);
            U_global = findLambda(M2, df, 0.05);

            const rmsea2_est = Math.sqrt(Math.max((M2 - df) / (I * df), 0));
            const rmsea2_L = Math.sqrt(L_global / (I * df));
            const rmsea2_U = Math.sqrt(U_global / (I * df));

            // 現在のλでの累積確率
            const currentCDF = nonCentralChiSqCDF(M2, df, lambda);

            resultsBox.innerHTML = `
                <div class="flex justify-between"><span>点推定 <span class="math">λ<sub>est</sub></span>:</span> <span class="font-bold">${est_global.toFixed(3)}</span></div>
                <div class="flex justify-between text-green-700"><span>下限 L (CDF=0.95):</span> <span class="font-bold">${L_global.toFixed(3)}</span></div>
                <div class="flex justify-between text-red-700"><span>上限 U (CDF=0.05):</span> <span class="font-bold">${U_global.toFixed(3)}</span></div>
                <hr class="my-2 border-blue-200">
                <div class="flex justify-between font-bold"><span>RMSEA<sub>2</sub> 推定値:</span> <span>${rmsea2_est.toFixed(3)}</span></div>
                <div class="flex justify-between text-xs mt-1"><span>90% 信頼区間:</span> <span>[ ${rmsea2_L.toFixed(3)}, ${rmsea2_U.toFixed(3)} ]</span></div>
            `;

            drawCanvas(df, M2, lambda, currentCDF);
        }

        function drawCanvas(df, M2, lambda, currentCDF) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 50;
            const width = canvas.width - 2 * padding;
            const height = canvas.height - 2 * padding;

            // X軸の範囲決定 (M2と分布の広がりをカバーする)
            const maxX = Math.max(M2 * 1.5, df + lambda + 4 * Math.sqrt(df + 2 * lambda), 20);

            // Y軸の最大値決定 (分布のピークを探す)
            let maxY = 0;
            for (let x = 0.5; x <= maxX; x += maxX/100) {
                const y = nonCentralChiSqPDF(x, df, lambda);
                if (y > maxY) maxY = y;
            }
            maxY = maxY * 1.3; // 30% margin
            if (maxY < 0.01) maxY = 0.05;

            // 変換関数
            const getX = val => padding + (val / maxX) * width;
            const getY = val => canvas.height - padding - (val / maxY) * height;

            // 背景グリッド
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<=5; i++){
                let y = getY((i/5)*maxY);
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
            }
            ctx.stroke();

            // --- 塗りつぶし (CDF: x <= M2) ---
            ctx.beginPath();
            ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; // Tailwind blue-500 with opacity
            ctx.moveTo(getX(0), getY(0));
            for (let x = 0; x <= M2; x += maxX/200) {
                ctx.lineTo(getX(x), getY(nonCentralChiSqPDF(x, df, lambda)));
            }
            ctx.lineTo(getX(M2), getY(0));
            ctx.closePath();
            ctx.fill();

            // --- PDF 曲線の描画 ---
            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6'; // Tailwind blue-500
            ctx.lineWidth = 3;
            for (let x = 0; x <= maxX; x += maxX/200) {
                const y = nonCentralChiSqPDF(x, df, lambda);
                if (x === 0) ctx.moveTo(getX(x), getY(y));
                else ctx.lineTo(getX(x), getY(y));
            }
            ctx.stroke();

            // --- M2 の垂直線 ---
            const m2X = getX(M2);
            ctx.beginPath();
            ctx.strokeStyle = '#ef4444'; // Tailwind red-500
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.moveTo(m2X, padding);
            ctx.lineTo(m2X, canvas.height - padding);
            ctx.stroke();
            ctx.setLineDash([]);

            // M2 ラベル
            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`観測値 M2 = ${M2.toFixed(1)}`, m2X, padding - 10);

            // 面積 (CDF) のテキスト
            ctx.fillStyle = '#1e3a8a';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`青い面積 (累積確率) = ${currentCDF.toFixed(4)}`, padding + 20, padding + 20);

            // --- 軸とラベル ---
            ctx.beginPath();
            ctx.strokeStyle = '#374151'; // Tailwind gray-700
            ctx.lineWidth = 2;
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, canvas.height - padding);
            ctx.lineTo(canvas.width - padding, canvas.height - padding);
            ctx.stroke();

            ctx.fillStyle = '#374151';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('統計量 x', canvas.width / 2, canvas.height - 15);

            ctx.save();
            ctx.translate(20, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText(`確率密度 f(x; df=${df}, λ=${lambda.toFixed(1)})`, 0, 0);
            ctx.restore();

            // X軸目盛り
            let stepX = Math.pow(10, Math.floor(Math.log10(Math.max(maxX / 5, 1))));
            if (maxX / stepX > 10) stepX *= 2;
            for(let i=0; i<=maxX; i+=stepX) {
                let xPx = getX(i);
                if(xPx <= canvas.width - padding) {
                    ctx.fillText(i.toFixed(0), xPx, canvas.height - padding + 15);
                }
            }
        }

        dfRange.addEventListener('input', updateAndDraw);
        M2Range.addEventListener('input', updateAndDraw);
        IRange.addEventListener('input', updateAndDraw);
        lambdaRange.addEventListener('input', updateAndDraw);

        document.getElementById('btnL').addEventListener('click', () => {
            lambdaRange.value = L_global;
            updateAndDraw();
        });
        document.getElementById('btnEst').addEventListener('click', () => {
            lambdaRange.value = est_global;
            updateAndDraw();
        });
        document.getElementById('btnU').addEventListener('click', () => {
            lambdaRange.value = U_global;
            updateAndDraw();
        });

        // Initial Draw
        updateAndDraw();
    </script>
</body>
</html>
